# ============================================
# Nginx Configuration - ScanQueue Production
# ============================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ============================================
# Events
# ============================================
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# ============================================
# HTTP Context
# ============================================
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ----------------------------------------
    # Logging
    # ----------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ----------------------------------------
    # Performance
    # ----------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;

    # ----------------------------------------
    # Gzip Compression
    # ----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 1000;

    # ----------------------------------------
    # Rate Limiting
    # ----------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=app_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ----------------------------------------
    # Upstream Backends
    # ----------------------------------------
    upstream backend {
        least_conn;
        server backend:5000 max_fails=3 fail_timeout=30s;
        # Para escalabilidad futura:
        # server backend2:5000 max_fails=3 fail_timeout=30s;
        # server backend3:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        least_conn;
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ----------------------------------------
    # Redirect HTTP to HTTPS
    # ----------------------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check endpoint (sin redirect)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Redirect a HTTPS (todos los demás)
        location / {
            return 301 https://$host$request_uri;
        }

        # Certbot Challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # ----------------------------------------
    # HTTPS Server
    # ----------------------------------------
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # ============================
        # SSL/TLS Configuration
        # ============================
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        
        # SSL Protocols y Ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ============================
        # Security Headers
        # ============================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://; frame-ancestors 'none'" always;

        # ============================
        # Logging
        # ============================
        access_log /var/log/nginx/https_access.log main;
        error_log /var/log/nginx/https_error.log warn;

        # ============================
        # API Routes (/api/*)
        # ============================
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 100;

            # Proxy settings
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # Cache (no-cache para API)
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ============================
        # WebSocket Routes (/ws)
        # ============================
        location /ws {
            # Rate limiting
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 50;

            # WebSocket proxy
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts para WebSocket (más largos)
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # No buffering para WebSocket
            proxy_buffering off;
        }

        # ============================
        # Static Assets (Frontend)
        # ============================
        location ~ ^/(assets|public)/ {
            alias /usr/share/nginx/html/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header ETag "$file_mtime-$file_size";
        }

        # ============================
        # Root & Fallback (SPA)
        # ============================
        location / {
            # Rate limiting
            limit_req zone=app_limit burst=50 nodelay;

            root /usr/share/nginx/html;
            
            # SPA fallback
            try_files $uri $uri/ /index.html;

            # Cache control para HTML
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";

            # Acceso normal
            access_log on;
        }

        # ============================
        # Health Check
        # ============================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============================
        # Deny Access to Hidden Files
        # ============================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================
        # Deny Access to System Files
        # ============================
        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================
        # Error Pages
        # ============================
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}
